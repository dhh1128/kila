# Kila Phonotactics Analysis
# 
# Generated from analysis of non-affix words in glossary.md.
# 
# Methodology:
# - Analyzed 1205 non-affix lexical words (excluded affixes marked with -)
# - Treats m, n, l, r as VOCALIC (syllabic) when they function as syllable nuclei
# - Recognizes diphthongs per alphabets.md: ai, au, ei, ia, io, uy, ua, uw, ue, ui
# - Consonant clusters exclude vocalic sonorants
# - Counts indicate frequency in corpus
#
# Use this data when coining new words to ensure phonological naturalness.

metadata:
  corpus_size: 1205
  analysis_date: "2026-03-11"
  excludes_affixes: true
  treats_mnlr_as_vocalic_when_syllabic: true
  recognizes_diphthongs: true
  orthography: gwm  # Phonemic orthography

